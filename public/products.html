<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Collection | The Moharani</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="products">
    <header class="site-header">
      <div class="container nav-shell">
        <a class="brand" href="./index.html">
          <img src="./logo.png" alt="The Moharani logo" />
          <span>The Moharani</span>
        </a>
        <nav class="main-nav">
          <a href="./index.html">Home</a>
          <a href="./products.html">Collection</a>
          <a href="./wishlist.html">Wishlist <span id="wishlistCount">0</span></a>
          <a href="./cart.html" class="cart-link">
            <span class="nav-cart-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M7 6h14l-2 7H9L7 4H3" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
                <circle cx="10" cy="19" r="1.6" fill="currentColor"></circle>
                <circle cx="18" cy="19" r="1.6" fill="currentColor"></circle>
              </svg>
            </span>
            Cart <span id="cartCount">0</span>
          </a>
          <a href="./checkout.html">Checkout</a>
          <a href="./login.html">Login</a>
        </nav>
      </div>
    </header>

    <main class="container page-shell">
      <div class="section-head">
        <div>
          <p class="eyebrow">Explore Collection</p>
          <h1>Premium sarees</h1>
        </div>
      </div>

      <div class="toolbar">
        <input id="searchInput" class="search-input" placeholder="Search saree, fabric, category..." />
        <div class="filter-row">
          <button class="filter-chip active" data-category="All">All</button>
          <button class="filter-chip" data-category="Wedding">Wedding</button>
          <button class="filter-chip" data-category="Festive">Festive</button>
          <button class="filter-chip" data-category="Daily Wear">Daily Wear</button>
          <button class="filter-chip" data-category="Office Wear">Office Wear</button>
          <button class="filter-chip" data-category="Party">Party</button>
          <button class="filter-chip" data-category="Reception">Reception</button>
        </div>
      </div>

      <div id="productsGrid" class="product-grid"></div>
    </main>

    <a class="whatsapp-float" href="https://wa.me/919876543210" target="_blank" rel="noreferrer">WhatsApp</a>

    <footer class="site-footer compact">
      <div class="container footer-bottom">
        <p>The Moharani collection page with search, filters, wishlist, and cart flow.</p>
      </div>
    </footer>

    <div id="orderSuccessModal" class="success-modal hidden">
      <div class="success-dialog">
        <div class="success-ring"></div>
        <h3>Order placed successfully</h3>
        <p>Your Moharani order has been confirmed.</p>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
