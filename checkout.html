<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment | Vastra Saree House</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-page="checkout">
    <header class="site-header">
      <div class="container nav-shell">
        <a class="brand" href="/">Vastra Saree House</a>
        <nav class="main-nav">
          <a href="/">Home</a>
          <a href="/products.html">Products</a>
          <a href="/cart.html">Cart <span id="cartCount">0</span></a>
          <a href="/checkout.html">Payment</a>
          <a href="/login.html">Login</a>
          <a href="/admin.html">Admin</a>
        </nav>
      </div>
    </header>

    <main class="container page-shell">
      <div class="section-head">
        <div>
          <p class="eyebrow">Secure Checkout</p>
          <h1>Delivery and payment details</h1>
        </div>
      </div>

      <div class="checkout-layout">
        <form id="checkoutForm" class="panel form-grid">
          <h3>Customer Information</h3>
          <input name="name" placeholder="Full name" required />
          <input type="email" name="email" placeholder="Email address" required />
          <input name="phone" placeholder="Phone number" required />
          <input name="address" placeholder="Street address" required />
          <input name="city" placeholder="City" required />
          <input name="state" placeholder="State" required />
          <input name="zip" placeholder="PIN code" required />

          <h3>Payment</h3>
          <select name="method" required>
            <option value="Card">Credit / Debit Card</option>
            <option value="UPI">UPI</option>
            <option value="Cash on Delivery">Cash on Delivery</option>
          </select>
          <input name="cardNumber" placeholder="Card or UPI reference" required />

          <button class="btn btn-primary" type="submit">Place Order</button>
          <p id="checkoutMessage" class="status-text"></p>
        </form>

        <aside class="summary-card">
          <h3>Payment Summary</h3>
          <div id="checkoutSummary"></div>
        </aside>
      </div>
    </main>

    <footer class="site-footer compact">
      <div class="container footer-bottom">
        <p>Payments are processed in demo mode for this project build.</p>
      </div>
    </footer>

    <script src="/app.js"></script>
  </body>
</html>
